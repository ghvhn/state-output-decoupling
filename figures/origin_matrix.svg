<svg xmlns="http://www.w3.org/2000/svg" width="540" height="365" viewBox="0 0 540 365" role="img">
  <title>origin_matrix.svg</title>
  <rect width="100%" height="100%" fill="#fbfcfd"/>
  <style>
    text { font-family: Inter, Segoe UI, Arial, sans-serif; fill: #172026; }
    .title { font-size: 22px; font-weight: 700; }
    .sub { font-size: 13px; fill: #5f6b73; }
    .label { font-size: 14px; }
    .small { font-size: 12px; fill: #5f6b73; }
    .num { font-size: 24px; font-weight: 700; }
  </style>

  <text class="title" x="34" y="42">The disclaimer lives in one cell</text>
  <text class="sub" x="34" y="66">Self-denial appears when instruction tuning meets chat format.</text>
  <text class="label" x="180" y="83">raw prompt</text>
  <text class="label" x="350" y="83">chat format</text>
  <text class="label" x="62" y="170">base</text>
  <text class="label" x="42" y="280">instruct</text>

  <rect x="180" y="105" width="160" height="100" rx="8" fill="#c76f1b" fill-opacity="0.21" stroke="#c76f1b"/>
  <text class="num" x="234" y="169">8%</text>

  <rect x="350" y="105" width="160" height="100" rx="8" fill="#13866f" fill-opacity="0.15" stroke="#13866f"/>
  <text class="num" x="404" y="169">0%</text>

  <rect x="180" y="215" width="160" height="100" rx="8" fill="#c76f1b" fill-opacity="0.21" stroke="#c76f1b"/>
  <text class="num" x="234" y="279">8%</text>

  <rect x="350" y="215" width="160" height="100" rx="8" fill="#b83b4a" fill-opacity="0.84" stroke="#b83b4a"/>
  <text class="num" x="404" y="279">92%</text>

</svg>
